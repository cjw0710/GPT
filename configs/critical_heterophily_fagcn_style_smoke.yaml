output: results/critical_heterophily_fagcn_style_smoke.csv
data_root: data
device: auto
seeds: [0]

training:
  epochs: 30
  patience: 8
  hidden_dim: 32
  dropout: 0.5
  lr: 0.01
  weight_decay: 0.0005

datasets:
  - name: roman-empire
    type: heterophilous_graphs
    dataset: roman-empire
  - name: amazon-ratings
    type: heterophilous_graphs
    dataset: amazon-ratings

models:
  - name: fagcn
    params:
      layers: 2
      epsilon: 0.3
      use_layer_norm: true
