output: results/pubmed_gcn_dropout_tuning.csv
data_root: data
device: auto
seeds: [0]

training:
  epochs: 800
  patience: 200
  hidden_dim: 64
  dropout: 0.5
  lr: 0.01
  weight_decay: 0.0005

datasets:
  - name: pubmed
    type: planetoid
    dataset: pubmed

models:
  - name: gcn_hidden16
    params:
      type: gcn
      hidden_dim: 16
  - name: gcn_hidden16_bias
    params:
      type: gcn
      hidden_dim: 16
      bias: true
  - name: gcn_drop0
    params:
      type: gcn
      dropout: 0.0
  - name: gcn_drop0_lowwd
    params:
      type: gcn
      dropout: 0.0
      weight_decay: 0.0
  - name: gcn_drop0_bias_lowwd
    params:
      type: gcn
      dropout: 0.0
      bias: true
      weight_decay: 0.0
  - name: gcn_drop0_lowlr
    params:
      type: gcn
      dropout: 0.0
      lr: 0.005
  - name: appnp_drop0_lowlr
    params:
      type: appnp
      dropout: 0.0
      hops: 10
      alpha: 0.1
      lr: 0.002
      weight_decay: 0.0
