output: results/pubmed_csr_tuning.csv
data_root: data
device: auto
seeds: [0]

training:
  epochs: 800
  patience: 200
  hidden_dim: 64
  dropout: 0.5
  lr: 0.01
  weight_decay: 0.0005

datasets:
  - name: pubmed
    type: planetoid
    dataset: pubmed

models:
  - name: gcn_default
    params:
      type: gcn
  - name: gcn_bias
    params:
      type: gcn
      bias: true
  - name: gcn_lowwd
    params:
      type: gcn
      weight_decay: 0.0
  - name: gcn_drop0_lowwd
    params:
      type: gcn
      dropout: 0.0
      weight_decay: 0.0
  - name: gcn_hidden16
    params:
      type: gcn
      hidden_dim: 16
  - name: appnp_lowlr
    params:
      type: appnp
      hops: 10
      alpha: 0.1
      lr: 0.002
  - name: appnp_lowlr_lowwd
    params:
      type: appnp
      hops: 10
      alpha: 0.1
      lr: 0.002
      weight_decay: 0.0
  - name: appnp_alpha02
    params:
      type: appnp
      hops: 10
      alpha: 0.2
      lr: 0.002
      weight_decay: 0.0
