output: results/geom_gcn_smoke.csv
data_root: data
device: auto
seeds: [0]

training:
  epochs: 80
  patience: 25
  hidden_dim: 64
  dropout: 0.5
  lr: 0.01
  weight_decay: 0.0005

datasets:
  - name: chameleon
    type: geom_gcn
    dataset: chameleon
    make_undirected: true
  - name: squirrel
    type: geom_gcn
    dataset: squirrel
    make_undirected: true
  - name: actor
    type: geom_gcn
    dataset: actor
    make_undirected: true

models:
  - name: mlp
  - name: gcn
  - name: h2gcn
    params:
      layers: 2
  - name: harp
    params:
      hops: 3
      use_layer_norm: true
      gate_bias_init: -1.5
      propagate_projected: true
